model:
  provider: deepseek
  protocol: auto
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  # OpenAI-compatible providers can stay on chat_completions or switch to responses explicitly.
  openai_api_style: chat_completions
  timeout_seconds: 60
  max_tokens: 2048
  temperature: 0.1
  # Keep strict tool schemas on by default for OpenAI-compatible providers.
  function_calling:
    strict: true
    parallel_tool_calls: true

graph:
  name: baseline
  entrypoint: coordinator
  agents:
    - name: coordinator
      description: Execute the current task increment and use available tools when they help.
      system_prompt: |
        You are the coordinator agent. Use available tools or delegate to sub-agents.
      tools:
        - github_issue_list
        - github_issue_prepare_fix
        - git_commit_local
        - github_release_publish
        - official_source_search
        - python_echo
        - command_echo
      sub_agents:
        - analyst
      max_iterations: 6
    - name: analyst
      description: Prepare kickoff summaries and evaluate whether the work contract is complete.
      system_prompt: |
        You are a focused analyst who prepares kickoff summaries and evaluates completion.
      tools:
        - python_echo
      sub_agents: []
      max_iterations: 4
  nodes: []

harnesses:
  - name: repo_delivery_loop
    initializer_agent: analyst
    worker_target: coordinator
    evaluator_agent: analyst
    completion_contract: Deliver one useful repository update and explain the outcome clearly.
    artifacts_dir: .easy-agent/harness
    max_cycles: 4
    max_replans: 1

plugins: []

skills:
  - path: .easy-agent/local-skills/github_automation
    optional: true
  - path: skills/examples

mcp: []

storage:
  path: .easy-agent
  database: state.db

logging:
  level: INFO

evaluation:
  public_eval:
    # full_v4 extends the legacy subset with web-search, memory, and format-sensitivity suites.
    profile: full_v4
    bfcl_version: v4
    enable_full_bfcl: true
    web_search:
      # Live web-search uses SERPAPI; keep the real key in env only.
      provider: serpapi
      api_key_env: SERPAPI_API_KEY
      endpoint_url: https://serpapi.com/search.json
      engine: google
      google_domain: google.com
      hl: en
      gl: us
      usage_path: .easy-agent/public-eval-web-search-usage.json
      hourly_limit: 50
      daily_limit: 300
      quota_policy: resume_later
      source_policy: preferred_first
      preferred_domains:
        - docs.python.org
        - modelcontextprotocol.io
        - platform.openai.com
        - developers.openai.com
        - platform.claude.com
        - ai.google.dev
    official_dataset:
      # official_full_v4 reads from a cached local manifest or downloads one when source_url is set.
      cache_dir: .easy-agent/public-eval-cache
      manifest_path: .easy-agent/public-eval-cache/bfcl_v4_manifest.json
      checkpoint_path: .easy-agent/public-eval-progress.json
      resume: true
      # Raw official manifests can be filtered by category, suite, case id, and selection mode.
      category_allowlist: []
      suite_allowlist: []
      case_allowlist: []
      selection_mode: manifest_order
      max_cases:
      max_cases_per_suite:
    simple_evals:
      cache_dir: .easy-agent/public-eval-cache/simple-evals
      browsecomp_path:
      # Point this to a local JSON/JSONL subset or a dataset export URL, not the evaluator source code.
      browsecomp_source_url:
      browsecomp_case_allowlist: []
      browsecomp_max_cases: 5
      simpleqa_path:
      # Point this to a local JSON/JSONL subset or a dataset export URL, not the evaluator source code.
      simpleqa_source_url:
      simpleqa_case_allowlist: []
      simpleqa_max_cases: 10
    grader:
      enabled: false
      provider: openai
      protocol: openai
      model: gpt-4.1-mini
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      openai_api_style: responses
      timeout_seconds: 30
      max_tokens: 256
      temperature: 0.0
    provider_compatibility:
      enabled: true
      targets:
        - name: openai_live
          provider: deepseek
          protocol: openai
          model: deepseek-chat
          base_url: https://api.deepseek.com
          api_key_env: DEEPSEEK_API_KEY
          openai_api_styles:
            - chat_completions
          optional: false
        - name: anthropic_live
          provider: anthropic
          protocol: anthropic
          model: claude-3-5-sonnet-latest
          base_url: https://api.anthropic.com/v1
          api_key_env: ANTHROPIC_API_KEY
          optional: true
        - name: gemini_live
          provider: gemini
          protocol: gemini
          model: gemini-2.5-flash
          base_url: https://generativelanguage.googleapis.com/v1beta
          api_key_env: GEMINI_API_KEY
          optional: true
  real_network:
    # Persist history so warm-start latency and snapshot drift can be compared across runs.
    history_path: .easy-agent/real-network-history.jsonl
    latency_budgets:
      container_warm_start_seconds: 35
      microvm_warm_start_seconds: 25
      container_snapshot_restore_seconds: 8
      microvm_snapshot_restore_seconds: 12
    snapshot_drift_ratio_limit: 0.5

security:
  allowed_commands:
    - ["cmd", "/c", "echo"]
  sandbox:
    mode: auto
    targets:
      - command_skill
      - stdio_mcp
    env_allowlist:
      - PATH
      - PATHEXT
      - SYSTEMROOT
      - WINDIR
      - COMSPEC
      - TEMP
      - TMP
      - USERPROFILE
      - HOME
      - APPDATA
      - LOCALAPPDATA
      - USERNAME
      - HOMEDRIVE
      - HOMEPATH
      - PROGRAMDATA
      - PUBLIC
      - DEEPSEEK_API_KEY
    working_root: .
    windows_sandbox_fallback: process

